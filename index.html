<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🤍 إلى إسراء</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

background:linear-gradient(180deg,#ffe8f5,#fff5fb,#ffeef9);

overflow-x:hidden;

color:#444;

}

/* الخلفية */

.bg{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

overflow:hidden;

z-index:-1;

}

/* العناصر الطائرة */

.float{

position:absolute;

font-size:24px;

animation:floatUp linear infinite;

opacity:.8;

}

@keyframes floatUp{

0%{

transform:translateY(110vh) rotate(0deg);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-20vh) rotate(360deg);

opacity:0;

}

}

/* الأقسام */

section{

display:none;

min-height:100vh;

padding:30px 20px;

justify-content:center;

align-items:center;

flex-direction:column;

text-align:center;

animation:fade .8s;

}

section.active{

display:flex;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

/* البطاقات */

.card{

width:100%;

max-width:390px;

background:rgba(255,255,255,.65);

backdrop-filter:blur(12px);

padding:30px;

border-radius:30px;

box-shadow:0 10px 35px rgba(255,105,180,.18);

border:2px solid rgba(255,255,255,.5);

}

/* الصورة */

.avatar{

width:130px;

height:130px;

border-radius:50%;

object-fit:cover;

margin-bottom:20px;

border:5px solid white;

box-shadow:0 0 25px rgba(255,105,180,.3);

}

/* العناوين */

h1{

font-size:32px;

color:#ff4fa3;

margin-bottom:12px;

}

h2{

font-size:25px;

color:#ff5cab;

margin-bottom:15px;

}

p{

font-size:17px;

line-height:2;

color:#555;

}

/* الأزرار */

button{

width:100%;

margin-top:15px;

padding:15px;

border:none;

border-radius:999px;

background:#ff69b4;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);

background:#ff4fa3;

}

/* الإجابات */

.answer{

background:white;

color:#ff4fa3;

border:2px solid #ffd3ea;

}

.answer:hover{

background:#ffe5f3;

}

/* كتابة الرسالة */

#typing{

white-space:pre-line;

line-height:2.1;

font-size:18px;

font-weight:bold;

color:#333;

min-height:260px;

}

</style>

</head>

<body>

<div class="bg" id="bg"></div>

<!-- البداية -->

<section id="start" class="active">

<div class="card">

<img src="esraa.jpg" class="avatar">

<h1>مرحبًا إسراء 🤍</h1>

<p>

قبل ما تبدئين...

في شيء بسيط جدًا

حبيت أسويه لك.

</p>

<button onclick="next('q1')">

ابدئي ✨

</button>

</div>

</section>
<!-- السؤال الأول -->

<section id="q1">

<div class="card">

<img src="esraa.jpg" class="avatar">

<h2>لو عندك أمنية الآن... 🌸</h2>

<p>

وش بتكون؟

</p>

<button class="answer" onclick="next('q2')">

أن الكل يكون سعيد 🤍

</button>

<button class="answer" onclick="next('q2')">

أسافر لمكان جميل ✨

</button>

<button class="answer" onclick="next('q2')">

أحتفظ بالناس اللي أحبهم 💖

</button>

</div>

</section>

<!-- السؤال الثاني -->

<section id="q2">

<div class="card">

<img src="esraa.jpg" class="avatar">

<h2>وش أكثر شيء يريحك؟ 🌷</h2>

<button class="answer" onclick="next('q3')">

جلسة هادئة ☕

</button>

<button class="answer" onclick="next('q3')">

طلعة مع ناس أحبهم 🌸

</button>

<button class="answer" onclick="next('q3')">

أسمع كلام لطيف 🤍

</button>

</div>

</section>

<!-- السؤال الثالث -->

<section id="q3">

<div class="card">

<img src="esraa.jpg" class="avatar">

<h2>آخر سؤال يا إسراء 💖</h2>

<p>

جاهزة تشوفين السبب الحقيقي لهذا الموقع؟

</p>

<button onclick="next('letter')">

جاهزة ✨

</button>

</div>

</section>

<!-- الرسالة -->

<section id="letter">

<div class="card">

<img src="esraa.jpg" class="avatar">

<h1>إلى إسراء 🤍</h1>

<p id="typing"></p>

<button onclick="next('end')">

كملي 🌸

</button>

</div>

</section>

<!-- النهاية -->

<section id="end">

<div class="card">

<img src="esraa.jpg" class="avatar">

<h1>🤍</h1>

<p>

أتمنى أن هذا الشيء البسيط

رسم ابتسامة على وجهك.

هذا كل اللي كنت أتمناه.

🌸

</p>

<button onclick="location.reload()">

إعادة الرحلة ✨

</button>

</div>

</section>
<script>

/* الخلفية المتحركة */

const bg=document.getElementById("bg");

const icons=[
"🌸","💖","🦋","✨","🌷","🤍","🎀"
];

setInterval(()=>{

const item=document.createElement("div");

item.className="float";

item.innerHTML=icons[
Math.floor(Math.random()*icons.length)
];

item.style.left=Math.random()*100+"vw";

item.style.fontSize=
(18+Math.random()*22)+"px";

item.style.animationDuration=
(5+Math.random()*4)+"s";

bg.appendChild(item);

setTimeout(()=>{

item.remove();

},9000);

},220);

/* التنقل */

function next(id){

document.querySelectorAll("section")
.forEach(s=>{

s.classList.remove("active");

});

document
.getElementById(id)
.classList.add("active");

if(id==="letter"){

typeMessage();

}

}

/* الكتابة */

const message=`إسراء...

ما كان فيه مناسبة معينة.

ولا سبب خاص.

بس كنت أبغى أسوي لك شيء مختلف...

شيء كل ما فتحتيه

تتذكرين إن فيه شخص

تعب عليه عشان يشوف ابتسامتك.

أتمنى أيامك كلها تكون جميلة...

وأتمنى مهما صار

تبقين تبتسمين دائمًا.

وجودك جميل...

وهذا الموقع مجرد تذكار بسيط

من شخص يتمنى لك كل خير.

🤍`;

let i=0;

function typeMessage(){

const box=document.getElementById("typing");

if(box.innerHTML!="") return;

function write(){

if(i<message.length){

box.innerHTML+=message.charAt(i);

i++;

setTimeout(write,35);

}

}

write();

}

</script>

</body>

</html>
